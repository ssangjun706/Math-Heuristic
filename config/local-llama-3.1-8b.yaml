# Example config for local vLLM server
# vLLM server will be automatically started when running request_uri.py

model_name: meta-llama/Llama-3.1-8B-Instruct
local: true
auto_start: true  # Set to false if you want to manually start the server

# Optional: Customize server endpoint (default: http://localhost:65001/v1/chat/completions)
# api_base_url: http://localhost:8000/v1/chat/completions

# Optional: vLLM server arguments
vllm_args:
  tensor-parallel-size: 1
  gpu-memory-utilization: 0.9
  # max-model-len: 8192
  # dtype: auto
  # trust-remote-code: true

parameter:
  max_tokens: 2048
  temperature: 0.7
  top_p: 0.95
